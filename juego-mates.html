<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión Matemática: 3er Grado</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #292f36;
            --light: #f7fff7;
            --font-main: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
            background-color: #2C3E50;
            background-image: radial-gradient(#34495e 15%, transparent 16%), radial-gradient(#34495e 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: var(--dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenedor Principal */
        #game-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: var(--light);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid var(--dark);
        }

        /* Pantallas (Inicio, Juego, Final) */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease-out;
        }

        /* Pantalla de Inicio */
        h1 {
            font-size: 3rem;
            color: var(--primary);
            text-shadow: 3px 3px 0px var(--dark);
            text-align: center;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: var(--font-main);
            box-shadow: 0 6px 0 #2a9d96;
            transition: transform 0.1s;
            margin: 10px;
        }

        .btn:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .btn-small {
            padding: 10px 20px;
            font-size: 1rem;
        }

        /* HUD (Puntos y Vidas) */
        #hud {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background: var(--dark);
            color: white;
            font-size: 1.2rem;
            width: 100%;
            z-index: 20;
        }

        .hud-item span {
            color: var(--accent);
            font-weight: bold;
        }

        /* Área de Juego */
        #game-area {
            flex: 1;
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px;
        }

        #question-text {
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--dark);
            min-height: 60px;
        }

        /* Estilos específicos por minijuego */
        
        /* 1. Lotería Saltarina */
        .bubbles-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }
        .bubble {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #c0392b;
            transition: transform 0.2s;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble:hover { transform: scale(1.1); }
        .bubble:active { transform: scale(0.95); box-shadow: 0 0 0 #c0392b; }

        /* 2. Tienda */
        .shop-items {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shop-item {
            background: white;
            border: 3px solid var(--dark);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            width: 120px;
            transition: transform 0.2s;
        }
        .shop-item:hover { border-color: var(--secondary); transform: translateY(-5px); }
        .shop-emoji { font-size: 3rem; }
        .shop-price { font-weight: bold; color: var(--secondary); font-size: 1.2rem; }
        #shop-instruction { font-size: 1.2rem; color: #666; margin-bottom: 10px; }

        /* 3. Geometría */
        .geo-shapes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }
        .shape-card {
            background: white;
            border: 3px solid #ddd;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }
        .shape-draw { height: 80px; width: 80px; margin-bottom: 10px; transition: fill 0.3s; }
        
        /* 4. Pizza */
        .pizza-container { position: relative; width: 250px; height: 250px; margin-bottom: 20px; }
        .pizza-slice {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            box-sizing: border-box;
            border: 2px solid #d35400;
            background: #f1c40f;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 100%, 0 100%);
            transition: background 0.3s;
        }
        .pizza-slice.topping { background: #e74c3c; } /* Pepperoni */
        .pizza-slice.topping-2 { background: #fff; } /* Queso */

        /* 5. Medidas */
        .measure-line {
            height: 20px;
            background: repeating-linear-gradient(45deg, #ccc, #ccc 10px, #999 10px, #999 20px);
            width: 0; /* Animar esto */
            margin: 20px 0;
            border-radius: 10px;
            position: relative;
        }
        .ruler {
            width: 300px;
            height: 40px;
            background: #333;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            align-items: flex-end;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        .ruler-mark { height: 10px; width: 2px; background: white; }
        .ruler-mark.mid { height: 15px; }

        /* Feedback Modal */
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 5px solid var(--dark);
        }
        #feedback.show { transform: translate(-50%, -50%) scale(1); }
        #feedback-icon { font-size: 4rem; margin-bottom: 10px; display: block; }
        .correct { color: #2ecc71; border-color: #2ecc71 !important; }
        .wrong { color: #e74c3c; border-color: #e74c3c !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes shake { 
            0% { transform: translateX(0); } 
            25% { transform: translateX(-5px); } 
            75% { transform: translateX(5px); } 
            100% { transform: translateX(0); } 
        }
        .shake { animation: shake 0.4s ease-in-out; }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .bubble { width: 60px; height: 60px; font-size: 1.2rem; }
            .shop-item { width: 45%; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Pantalla de Inicio -->
    <div id="start-screen" class="screen active">
        <h1>🚀 Misión Matemática</h1>
        <p style="font-size: 1.2rem; text-align: center; margin-bottom: 30px;">
            ¡Hola explorador! Completa 4 misiones para ganar el título de Maestro de los Números.
        </p>
        <button class="btn" onclick="game.start()">¡JUGAR!</button>
    </div>

    <!-- Pantalla de Juego -->
    <div id="hud" style="display:none;">
        <div class="hud-item">Puntos: <span id="score">0</span></div>
        <div class="hud-item">Misión: <span id="mission-name">1/4</span></div>
        <div class="hud-item">❤️ <span id="lives">3</span></div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-area">
            <!-- El contenido dinámico se inyectará aquí -->
        </div>
    </div>

    <!-- Pantalla Final -->
    <div id="end-screen" class="screen">
        <h1 id="end-title">¡Misión Cumplida!</h1>
        <div style="font-size: 5rem; margin: 20px;">🏆</div>
        <p id="end-message" style="font-size: 1.5rem; text-align: center;">¡Has completado todos los desafíos!</p>
        <p>Puntuación Final: <span id="final-score" style="font-weight:bold; color:var(--primary);">0</span></p>
        <button class="btn" onclick="game.reset()">JUGAR DE NUEVO</button>
    </div>

    <!-- Modal de Feedback -->
    <div id="feedback">
        <span id="feedback-icon">✅</span>
        <h2 id="feedback-text">¡Correcto!</h2>
    </div>
</div>

<script>
/**
 * Lógica del Juego
 * Genera preguntas y maneja el estado.
 */

// Sistema de Audio Simple (Web Audio API)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(500, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
    } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(200, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'click') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }
}

// Generador de Números Aleatorios
function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

const game = {
    score: 0,
    lives: 3,
    currentMissionIndex: 0,
    missions: [],
    isPlaying: false,

    start: function() {
        playSound('click');
        this.score = 0;
        this.lives = 3;
        this.currentMissionIndex = 0;
        this.updateHud();
        
        // Orden aleatorio de misiones
        this.missions = [
            new BubbleMission(),
            new ShopMission(),
            new GeometryMission(),
            new FractionMission()
        ].sort(() => Math.random() - 0.5);

        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('end-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        document.getElementById('hud').style.display = 'flex';
        
        this.loadMission();
    },

    loadMission: function() {
        if (this.currentMissionIndex >= this.missions.length) {
            this.endGame(true);
            return;
        }
        const mission = this.missions[this.currentMissionIndex];
        document.getElementById('mission-name').innerText = `${this.currentMissionIndex + 1}/${this.missions.length}`;
        mission.init();
    },

    handleAnswer: function(isCorrect) {
        const feedback = document.getElementById('feedback');
        const icon = document.getElementById('feedback-icon');
        const text = document.getElementById('feedback-text');

        if (isCorrect) {
            this.score += 100;
            playSound('correct');
            feedback.className = 'correct show';
            icon.innerText = '⭐';
            text.innerText = '¡Muy Bien!';
            setTimeout(() => {
                feedback.classList.remove('show');
                this.currentMissionIndex++;
                this.updateHud();
                this.loadMission();
            }, 1500);
        } else {
            this.lives--;
            playSound('wrong');
            feedback.className = 'wrong show';
            icon.innerText = '❌';
            text.innerText = '¡Inténtalo de nuevo!';
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => {
                document.getElementById('game-container').classList.remove('shake');
                feedback.classList.remove('show');
                this.updateHud();
                if (this.lives <= 0) this.endGame(false);
            }, 1000);
        }
    },

    updateHud: function() {
        document.getElementById('score').innerText = this.score;
        document.getElementById('lives').innerText = this.lives;
    },

    endGame: function(win) {
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('hud').style.display = 'none';
        document.getElementById('end-screen').classList.add('active');
        
        const title = document.getElementById('end-title');
        const msg = document.getElementById('end-message');
        
        if (win) {
            title.innerText = "¡Misión Cumplida!";
            title.style.color = "#2ecc71";
            msg.innerText = "¡Eres un genio de las matemáticas!";
        } else {
            title.innerText = "¡Oh no!";
            title.style.color = "#e74c3c";
            msg.innerText = "Te quedaste sin vidas. ¡Inténtalo otra vez!";
        }
        document.getElementById('final-score').innerText = this.score;
    },

    reset: function() {
        playSound('click');
        this.start();
    }
};

/* -----------------------------------------------------------
   DEFINICIÓN DE LAS MISIONES (Minijuegos)
   ----------------------------------------------------------- */

// Misión 1: Lotería Saltarina (Cálculo Mental)
class BubbleMission {
    init() {
        const area = document.getElementById('game-area');
        area.innerHTML = `<div id="question-text">${this.getQuestionText()}</div><div class="bubbles-container" id="bubbles"></div>`;
        
        const container = document.getElementById('bubbles');
        const correctAnswer = this.answer;
        
        // Generar opciones (1 correcta, 3 distractores)
        let options = [correctAnswer];
        while (options.length < 4) {
            let fake = correctAnswer + randomInt(-5, 5);
            if (fake > 0 && !options.includes(fake)) options.push(fake);
        }
        options.sort(() => Math.random() - 0.5);

        options.forEach(num => {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = num;
            bubble.onclick = () => {
                playSound('click');
                game.handleAnswer(num === correctAnswer);
            };
            container.appendChild(bubble);
        });
    }

    getQuestionText() {
        const type = Math.random();
        if (type < 0.33) { // Suma
            const a = randomInt(10, 50);
            const b = randomInt(10, 50);
            this.answer = a + b;
            return `¿Cuánto es ${a} + ${b}?`;
        } else if (type < 0.66) { // Resta
            const a = randomInt(20, 60);
            const b = randomInt(1, a);
            this.answer = a - b;
            return `¿Cuánto es ${a} - ${b}?`;
        } else { // Multiplicación simple
            const a = randomInt(2, 9);
            const b = randomInt(2, 9);
            this.answer = a * b;
            return `¿Cuánto es ${a} x ${b}?`;
        }
    }
}

// Misión 2: La Tienda (Suma de Precios)
class ShopMission {
    init() {
        const area = document.getElementById('game-area');
        
        // Seleccionar 3 items aleatorios y precios
        const items = [
            { name: 'Manzana', price: randomInt(5, 15), emoji: '🍎' },
            { name: 'Leche', price: randomInt(20, 35), emoji: '🥛' },
            { name: 'Pan', price: randomInt(10, 20), emoji: '🍞' },
            { name: 'Pelota', price: randomInt(40, 60), emoji: '⚽' },
            { name: 'Libro', price: randomInt(50, 80), emoji: '📚' }
        ];
        const cart = items.sort(() => Math.random() - 0.5).slice(0, 3);
        const total = cart.reduce((sum, item) => sum + item.price, 0);

        // Generar respuestas
        let options = [total];
        while (options.length < 4) {
            let fake = total + randomInt(-10, 10);
            if (fake > 0 && !options.includes(fake)) options.push(fake);
        }
        options.sort(() => Math.random() - 0.5);

        let html = `<h3>🛒 ¿Cuánto cuesta todo junto?</h3><div class="shop-items">`;
        cart.forEach(item => {
            html += `<div class="shop-item"><div class="shop-emoji">${item.emoji}</div><div class="shop-price">$${item.price}</div></div>`;
        });
        html += `</div><p id="shop-instruction">Total: Seleccione una opción</p><div class="bubbles-container" style="margin-top:20px">`;
        
        options.forEach(price => {
            html += `<div class="bubble" onclick="playSound('click'); game.handleAnswer(${price === total})">$${price}</div>`;
        });
        html += `</div>`;

        area.innerHTML = html;
    }
}

// Misión 3: Geometría (Identificar formas)
class GeometryMission {
    init() {
        const area = document.getElementById('game-area');
        
        const shapes = [
            { id: 'circle', name: 'Círculo', svg: '<circle cx="40" cy="40" r="35" fill="#4ECDC4"/>' },
            { id: 'rect', name: 'Rectángulo', svg: '<rect x="5" y="15" width="70" height="50" fill="#FF6B6B"/>' },
            { id: 'triangle', name: 'Triángulo', svg: '<polygon points="40,5 75,75 5,75" fill="#FFE66D"/>' },
            { id: 'square', name: 'Cuadrado', svg: '<rect x="10" y="10" width="60" height="60" fill="#9B59B6"/>' }
        ];
        
        // Elegir la correcta
        const correctShape = shapes[randomInt(0, shapes.length)];
        
        let html = `<h2 id="question-text">Encuentra el: ${correctShape.name}</h2><div class="geo-shapes">`;
        
        // Mezclar opciones
        const options = [...shapes].sort(() => Math.random() - 0.5);
        
        options.forEach(shape => {
            html += `
                <div class="shape-card" onclick="playSound('click'); game.handleAnswer('${shape.name}' === '${correctShape.name}')">
                    <svg class="shape-draw" viewBox="0 0 80 80">${shape.svg}</svg>
                    <span>${shape.name}</span>
                </div>
            `;
        });
        html += `</div>`;
        area.innerHTML = html;
    }
}

// Misión 4: Pizza (Fracciones)
class FractionMission {
    init() {
        const area = document.getElementById('game-area');
        const fraction = [2, 4, 8][randomInt(0, 2)]; // Mitades, cuartos u octavos
        const numParts = 8; // Siempre dibujamos 8 partes para consistencia visual
        
        // SVG Pizza construction
        let svgParts = '';
        for(let i=0; i<8; i++) {
            // Rotación para cada porción (45 grados cada una)
            const rotation = i * 45;
            svgParts += `<path d="M100,100 L100,0 A100,100 0 0,1 196.6,58.8 Z" fill="#f1c40f" stroke="#d35400" stroke-width="2" transform="rotate(${rotation} 100 100)" class="slice" data-id="${i}" onclick="FractionMission.check(this)"/>`;
        }

        const instruction = fraction === 2 ? "Coloca toppings en la MITAD (1/2)" : 
                           fraction === 4 ? "Coloca toppings en un CUARTO (1/4)" :
                           "Coloca toppings en un OCTAVO (1/8)";

        const targetCount = fraction === 2 ? 4 : fraction === 4 ? 2 : 1;

        area.innerHTML = `
            <h2 id="question-text">${instruction}</h2>
            <div style="position:relative; width:200px; height:200px;">
                <svg viewBox="0 0 200 200" style="width:100%; height:100%; overflow:visible;">
                    ${svgParts}
                </svg>
            </div>
            <p>Haz clic en las porciones para poner pepperoni 🍕</p>
            <button class="btn btn-small" onclick="FractionMission.submit(${targetCount})">¡Listo!</button>
            <button class="btn btn-small" style="background:#ccc" onclick="game.loadMission()">Saltar</button>
        `;
    }

    static check(el) {
        playSound('click');
        // Alternar color rojo (topping) vs amarillo (queso)
        if (el.getAttribute('fill') === '#f1c40f') {
            el.setAttribute('fill', '#e74c3c');
        } else {
            el.setAttribute('fill', '#f1c40f');
        }
    }

    static submit(targetCount) {
        const slices = document.querySelectorAll('.slice');
        let currentCount = 0;
        slices.forEach(s => {
            if (s.getAttribute('fill') === '#e74c3c') currentCount++;
        });
        game.handleAnswer(currentCount === targetCount);
    }
}

// Ajuste para asegurar que el scope del método estático sea accesible
window.FractionMission = FractionMission;

</script>

</body>
</html>
